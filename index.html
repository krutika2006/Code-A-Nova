<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Portfolio</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>

<body>

<div class="bg"></div>
<div class="blob b1"></div>
<div class="blob b2"></div>

<header class="nav">
  <h2>DevPortfolio</h2>
  <ul>
    <li><a href="#home">Home</a></li>
    <li><a href="#about">About</a></li>
    <li><a href="#skills">Skills</a></li>
    <li><a href="#projects">Projects</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
</header>

<!-- HERO -->
<section id="home" class="section hero">
  <h1>Hi, I'm <span>Frontend Developer</span></h1>
  <p id="typing"></p>

  <div class="btns">
    <a href="#projects">Explore Work</a>
    <a href="#contact" class="alt">Hire Me</a>
  </div>
</section>

<!-- ABOUT -->
<section id="about" class="section glass">
  <h2>About Me</h2>
  <p>I build modern, responsive and animated web experiences.</p>
</section>

<!-- SKILLS -->
<section id="skills" class="section">
  <h2>Skills</h2>

  <div class="skill">
    <span>HTML</span>
    <div class="bar"><div class="fill" style="width:95%"></div></div>
  </div>

  <div class="skill">
    <span>CSS</span>
    <div class="bar"><div class="fill" style="width:90%"></div></div>
  </div>

  <div class="skill">
    <span>JavaScript</span>
    <div class="bar"><div class="fill" style="width:85%"></div></div>
  </div>
</section>

<!-- PROJECTS -->
<section id="projects" class="section grid">
  <div class="card">Portfolio Website</div>
  <div class="card">Weather App</div>
  <div class="card">To-Do App</div>
</section>

<!-- CONTACT -->
<section id="contact" class="section glass">
  <h2>Contact Me</h2>

  <form id="contact-form">
    <input type="text" name="name" placeholder="Your Name" required>
    <input type="email" name="email" placeholder="Your Email" required>
    <textarea name="message" placeholder="Your Message" required></textarea>

    <button type="submit">Send Message</button>

    <p id="status"></p>
  </form>
</section>

<script src="script.js"></script>
</body>
</html>
